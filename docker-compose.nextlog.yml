# =========================================================
# Optional NextID + NextLog listener build layer
#
# Ana kurulumda otomatik kullanılmaz. NextLog listener jar
# dosyasını image içine eklemek istediğinde şu komutla çalıştır:
# docker compose -f docker-compose.yml -f docker-compose.nextlog.yml up -d --build
# =========================================================

services:
  nextid-core:
    build:
      context: .
      dockerfile: identity/nextid/Dockerfile
      args:
        NEXTID_CORE_IMAGE_TAG: ${NEXTID_CORE_IMAGE_TAG:-latest}
    image: ghcr.io/muratdelen/nextid:${NEXTID_IMAGE_TAG:-local}
    environment:
      NEXTLOG_AUDIT_URL: ${NEXTLOG_AUDIT_URL:-http://nextlog.harran.edu.tr/api/audit-events}
      NEXTLOG_MODULE: ${NEXTLOG_MODULE:-nextid}
      NEXTLOG_INGEST_API_KEY: ${NEXTLOG_INGEST_API_KEY:-dev-nextlog-secret}
